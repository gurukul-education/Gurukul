<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: #0d1b2a;
    color: white;
    text-align: center;
}

/* BACKGROUND IMAGE */
.course-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('course-bg.jpg') center/cover no-repeat;
    opacity: 0.2;
    z-index: -1;
}

/* CARD */
.card {
    margin: 50px auto;
    width: 350px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
}

/* PROFILE IMAGE */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #6ea2b3;
}

/* TEXT */
h2 {
    margin-top: 15px;
}

p {
    margin: 5px 0;
}

/* LINKS */
.links a {
    display: block;
    margin: 8px 0;
    color: #00c6ff;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="course-bg"></div>

<div class="card">

    <img id="profilePhoto" class="profile-img" src="" alt="Student Photo">

    <h2 id="studentName"></h2>
    <p id="studentPhone"></p>

    <h3 id="courseName"></h3>

    <div class="links">
        <a id="aadharLink" target="_blank">Aadhar Card</a>
        <a id="tenthLink" target="_blank">10th Marksheet</a>
        <a id="twelfthLink" target="_blank">12th Marksheet</a>
        <a id="photoLink" target="_blank">Photo</a>
    </div>

</div>

<script>
document.getElementById("studentName").innerText = localStorage.getItem("studentName");
document.getElementById("studentPhone").innerText = localStorage.getItem("studentPhone");
document.getElementById("courseName").innerText = localStorage.getItem("courseName");

let photo = localStorage.getItem("studentPhoto");

document.getElementById("profilePhoto").src = photo;
document.getElementById("photoLink").href = photo;

document.getElementById("aadharLink").href = localStorage.getItem("aadharLink");
document.getElementById("tenthLink").href = localStorage.getItem("tenthLink");
document.getElementById("twelfthLink").href = localStorage.getItem("twelfthLink");
</script>
<div class="course-bg"></div>
<div class="glow"></div>
</body>
</html>
