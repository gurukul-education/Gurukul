   <script>
function checkPassword(event, link) {
    event.preventDefault(); // stop normal link opening

    var password = prompt("Enter password to access this course:");

    var correctPassword = "1234"; // change this to your password

    if (password === correctPassword) {
        window.location.href = link; // open page
    } else {
        alert("Wrong password!");
    }

    return false;
}
