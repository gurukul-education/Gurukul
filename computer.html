<!DOCTYPE html>
<html lang="en">
<head>
    <title>Graphic Design Course</title>
    <link rel="stylesheet" href="style.css">
   
</head>

<body>

<section class="course-player">

    <h1>Graphic Design Course</h1>

    <div class="player-layout">
     
        <!-- 🎬 VIDEO PLAYER -->
        <div class="video-section">

            <div class="video-wrapper">

                
                <video id="mainVideo"
       controls
       controlsList="nodownload noplaybackrate"
       disablePictureInPicture
       width="100%"
       height="400">
    <source src="https://res.cloudinary.com/dr1wbu1og/video/upload/v1774576114/New_Project_9_46E50BC_frnpqm.mp4" type="video/mp4">
</video>
               

                
    
                <!-- 🔥 LOGO OVER VIDEO -->
                <img src="mainlogo.png" class="video-logo">
            </div>

            <h3 id="videoTitle">Video 1</h3>

        </div>

        <!-- 📃 PLAYLIST -->
        <div class="playlist">

            <!-- 33 VIDEOS -->
            <div class="video-item active" onclick="playVideo('New_Project_9_46E50BC_frnpqm.mp4', 'ENGLISH TYPING 1 ', this)">1. CLASS 1</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575500/New_Project_1_E62EF71_zlmwmq.mp4', 'ENGLISH TYPING 2',this)">2. CLASS 2</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575497/New_Project_2_C40F63E_nvz0dt.mp4', 'ENGLISH TYPING 3',this)">3. CLASS 3</div>

            <!-- CONTINUE SAME -->
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575520/New_Project_3_2E85AE8_pxqf0e.mp4', 'ENGLISH TYPING 4',this)">4. CLASS 4</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575518/New_Project_4_9A431D7_qel9hk.mp4', 'ENGLISH TYPING 5',this)">5. CLASS 5</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575517/New_Project_5_0F9C03D_jijdu9.mp4', 'ENGLISH TYPING 6',this)">6. CLASS 6</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575505/New_Project_6_6BB250F_w4vcl5.mp4', 'ENGLISH TYPING 7',this)">7. CLASS 7</div>
            <div class="video-item" onclick="playVideo('https://res.cloudinary.com/dr1wbu1og/video/upload/v1774575495/New_Project_8_F125669_tn6hp6.mp4', 'ENGLISH TYPING 8',this)">8. CLASS 8</div>
           
        </div>

    </div>

</section>

<script>
function playVideo(src, title) {
    const video = document.getElementById("mainVideo");
    const titleText = document.getElementById("videoTitle");

    video.src = src;
    video.play();
    titleText.innerText = title;

    document.querySelectorAll(".video-item").forEach(v => v.classList.remove("active"));
    event.target.classList.add("active");
}
</script>
<script src="script.js"></script>
</body>
</html>
